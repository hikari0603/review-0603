<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="theme-color" content="#0a0e1a" id="meta-theme">
<title>記憶鞏固器</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@500;600;700&family=Inter:wght@400;500&display=swap" rel="stylesheet">
<style>
:root{
  --bg:#0a0e1a;--surface:#111827;--surface2:#1a2235;--border:#1e2d45;
  --text:#e8eaf0;--muted:#6b7a99;--dim:#3d4f6b;
  --gold:#f4b942;--gold-dim:#c4922a;--gold-glow:rgba(244,185,66,.15);
  --green:#34d399;--red:#f87171;--blue:#60a5fa;
  --r1:#f87171;--r2:#fb923c;--r3:#fbbf24;--r4:#34d399;--r5:#60a5fa;--r6:#a78bfa;
  --nav-h:64px;--safe-bot:env(safe-area-inset-bottom,0px);
  --font-size:15px;--line-h:1.75;
}
body.light{
  --bg:#f5f0e8;--surface:#fffdf8;--surface2:#f0ebe0;--border:#d9d0c0;
  --text:#2c2416;--muted:#7a6a52;--dim:#b0a090;
  --gold:#b5600a;--gold-dim:#8a4500;--gold-glow:rgba(181,96,10,.12);
  --green:#1a7a50;--red:#c0392b;--blue:#1a5fa8;
}
body.dark.bg-dark  {--bg:#0a0e1a;--surface:#111827;--surface2:#1a2235;--border:#1e2d45;}
body.dark.bg-forest{--bg:#0c1410;--surface:#141d18;--surface2:#1c2920;--border:#243322;}
body.dark.bg-plum  {--bg:#120d1a;--surface:#1c1426;--surface2:#261c34;--border:#332447;}
body.dark.bg-slate {--bg:#0e1117;--surface:#161b22;--surface2:#1f2937;--border:#2d3748;}
body.dark.bg-sepia {--bg:#1a1410;--surface:#221c16;--surface2:#2c2418;--border:#3a3020;}
body.light.bg-paper{--bg:#f5f0e8;--surface:#fffdf8;--surface2:#f0ebe0;--border:#d9d0c0;}
body.light.bg-mint {--bg:#eef5f0;--surface:#f8fdf9;--surface2:#e4f0e8;--border:#c8ddd0;}
body.light.bg-sky  {--bg:#edf2f9;--surface:#f8fbff;--surface2:#e2eaf5;--border:#c5d4ea;}
body.light.bg-cream{--bg:#fdf8ee;--surface:#fffef8;--surface2:#f5eedc;--border:#e0d5be;}
body.light.bg-stone{--bg:#f0ede8;--surface:#faf9f6;--surface2:#e8e4de;--border:#d0c8bc;}

*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent;}
html,body{height:100%;overflow:hidden;}
body{background:var(--bg);color:var(--text);font-family:'Inter',sans-serif;
  font-size:var(--font-size);display:flex;flex-direction:column;
  transition:background .25s,color .25s;}

/* AUTH SCREEN */
#auth-screen{
  position:fixed;inset:0;background:var(--bg);
  display:flex;flex-direction:column;align-items:center;justify-content:center;
  z-index:999;padding:32px 24px;transition:background .25s;
}
.auth-logo{font-family:'Space Grotesk',sans-serif;font-size:28px;font-weight:700;color:var(--gold);margin-bottom:8px;}
.auth-sub{font-size:13px;color:var(--muted);margin-bottom:48px;text-align:center;line-height:1.6;}
.google-btn{
  display:flex;align-items:center;gap:12px;
  background:var(--surface);border:1px solid var(--border);
  color:var(--text);padding:14px 24px;border-radius:12px;
  font-size:15px;font-weight:500;cursor:pointer;
  font-family:'Inter',sans-serif;width:100%;max-width:320px;
  justify-content:center;transition:all .15s;
}
.google-btn:active{border-color:var(--gold);transform:scale(.98);}
.google-btn img{width:20px;height:20px;}
.auth-note{font-size:11px;color:var(--dim);margin-top:20px;text-align:center;line-height:1.6;max-width:280px;}

/* SYNC STATUS */
.sync-dot{
  width:7px;height:7px;border-radius:50%;
  background:var(--dim);display:inline-block;
  transition:background .3s;flex-shrink:0;
}
.sync-dot.syncing{background:var(--gold);animation:pulse 1s infinite;}
.sync-dot.synced{background:var(--green);}
.sync-dot.error{background:var(--red);}
@keyframes pulse{0%,100%{opacity:1;}50%{opacity:.4;}}

/* USER CHIP */
.user-chip{
  display:flex;align-items:center;gap:7px;
  background:var(--surface2);border:1px solid var(--border);
  border-radius:20px;padding:4px 10px 4px 4px;cursor:pointer;
  transition:all .15s;flex-shrink:0;
}
.user-chip:active{border-color:var(--gold);}
.user-avatar{
  width:24px;height:24px;border-radius:50%;object-fit:cover;
  background:var(--border);flex-shrink:0;
}
.user-name{font-size:12px;color:var(--muted);max-width:80px;
  overflow:hidden;text-overflow:ellipsis;white-space:nowrap;}

/* PAGES */
#app{flex:1;overflow:hidden;position:relative;}
.page{
  position:absolute;inset:0;overflow-y:auto;overflow-x:hidden;
  -webkit-overflow-scrolling:touch;display:none;
  padding-bottom:calc(var(--nav-h) + var(--safe-bot) + 16px);
}
.page.active{display:block;}

/* TOPBAR */
.topbar{
  background:var(--surface);border-bottom:1px solid var(--border);
  padding:10px 14px;display:flex;align-items:center;gap:8px;
  position:sticky;top:0;z-index:50;flex-shrink:0;
  transition:background .25s,border-color .25s;
}
.topbar-back{background:none;border:none;color:var(--muted);
  font-size:22px;cursor:pointer;padding:0 2px;line-height:1;display:none;}
.topbar-back.show{display:block;}
.topbar-titles{flex:1;min-width:0;}
.topbar-title{font-family:'Space Grotesk',sans-serif;font-size:17px;font-weight:600;
  white-space:nowrap;overflow:hidden;text-overflow:ellipsis;color:var(--text);}
.topbar-sub{font-size:11px;color:var(--muted);margin-top:1px;}
.topbar-right{display:flex;align-items:center;gap:8px;flex-shrink:0;}
.icon-btn{background:none;border:none;cursor:pointer;color:var(--muted);
  padding:4px;border-radius:8px;display:flex;align-items:center;
  justify-content:center;transition:color .15s;flex-shrink:0;}
.icon-btn:active{color:var(--gold);}
.icon-btn svg{width:20px;height:20px;}

/* BOTTOM NAV */
.bottom-nav{background:var(--surface);border-top:1px solid var(--border);
  display:flex;height:calc(var(--nav-h) + var(--safe-bot));
  padding-bottom:var(--safe-bot);flex-shrink:0;z-index:100;
  transition:background .25s,border-color .25s;}
.nav-tab{flex:1;display:flex;flex-direction:column;align-items:center;
  justify-content:center;gap:4px;cursor:pointer;color:var(--dim);
  transition:color .15s;position:relative;padding-top:2px;
  border:none;background:none;font-family:'Inter',sans-serif;}
.nav-tab.active{color:var(--gold);}
.nav-tab svg{width:22px;height:22px;}
.nav-tab span{font-size:11px;font-weight:500;}
.nav-badge{position:absolute;top:6px;right:calc(50% - 18px);
  background:var(--red);color:#fff;font-size:9px;font-weight:700;
  min-width:16px;height:16px;border-radius:8px;padding:0 4px;
  display:none;align-items:center;justify-content:center;}

/* DRAWER */
.drawer-overlay{position:fixed;inset:0;background:rgba(0,0,0,.5);
  z-index:200;opacity:0;pointer-events:none;transition:opacity .25s;}
.drawer-overlay.open{opacity:1;pointer-events:all;}
.drawer{position:fixed;bottom:0;left:0;right:0;background:var(--surface);
  border-top:1px solid var(--border);border-radius:20px 20px 0 0;
  padding:0 0 calc(20px + var(--safe-bot));z-index:201;
  transform:translateY(100%);transition:transform .28s cubic-bezier(.4,0,.2,1);
  max-height:90vh;overflow-y:auto;}
.drawer.open{transform:translateY(0);}
.drawer-handle{width:36px;height:4px;border-radius:2px;background:var(--border);margin:12px auto 0;}
.drawer-title{font-family:'Space Grotesk',sans-serif;font-size:16px;font-weight:600;
  padding:14px 20px 0;color:var(--text);}
.drawer-section{font-size:11px;font-weight:600;letter-spacing:.7px;
  text-transform:uppercase;color:var(--dim);padding:16px 20px 8px;}
.mode-toggle{display:flex;gap:8px;padding:0 20px;margin-bottom:4px;}
.mode-btn{flex:1;padding:11px 0;border-radius:10px;border:2px solid var(--border);
  background:transparent;color:var(--muted);font-size:14px;font-weight:500;
  cursor:pointer;font-family:'Inter',sans-serif;transition:all .15s;
  display:flex;align-items:center;justify-content:center;gap:6px;}
.mode-btn.active{border-color:var(--gold);background:var(--gold-glow);color:var(--gold);}
.swatch-grid{display:flex;gap:10px;padding:0 20px;flex-wrap:wrap;}
.swatch{width:44px;height:44px;border-radius:50%;border:3px solid transparent;
  cursor:pointer;transition:transform .15s,border-color .15s;position:relative;flex-shrink:0;}
.swatch:active{transform:scale(.92);}
.swatch.active{border-color:var(--gold);}
.swatch::after{content:'✓';position:absolute;inset:0;display:none;align-items:center;
  justify-content:center;font-size:16px;font-weight:700;color:var(--gold);}
.swatch.active::after{display:flex;}
.swatch-label{font-size:10px;color:var(--muted);text-align:center;margin-top:4px;width:44px;}
.swatch-item{display:flex;flex-direction:column;align-items:center;}
.font-row{display:flex;align-items:center;gap:12px;padding:0 20px;}
.font-btn{width:40px;height:40px;border-radius:10px;border:1px solid var(--border);
  background:transparent;color:var(--text);font-size:20px;font-weight:300;
  cursor:pointer;display:flex;align-items:center;justify-content:center;
  font-family:'Inter',sans-serif;flex-shrink:0;transition:all .15s;}
.font-btn:active{border-color:var(--gold);color:var(--gold);}
.font-track{flex:1;height:4px;background:var(--border);border-radius:2px;
  position:relative;cursor:pointer;}
.font-fill{height:100%;background:var(--gold);border-radius:2px;transition:width .15s;}
.font-thumb{width:18px;height:18px;border-radius:50%;background:var(--gold);
  border:2px solid var(--surface);position:absolute;top:50%;
  transform:translate(-50%,-50%);transition:left .15s;box-shadow:0 1px 4px rgba(0,0,0,.3);}
.font-label{font-size:13px;color:var(--muted);width:32px;text-align:right;flex-shrink:0;}

/* ACCOUNT SECTION IN DRAWER */
.account-row{
  display:flex;align-items:center;gap:12px;
  padding:12px 20px;
}
.account-avatar{width:40px;height:40px;border-radius:50%;object-fit:cover;background:var(--border);}
.account-info{flex:1;min-width:0;}
.account-name{font-size:14px;font-weight:500;color:var(--text);
  overflow:hidden;text-overflow:ellipsis;white-space:nowrap;}
.account-email{font-size:12px;color:var(--muted);margin-top:1px;
  overflow:hidden;text-overflow:ellipsis;white-space:nowrap;}
.signout-btn{padding:7px 14px;border-radius:8px;border:1px solid var(--border);
  background:transparent;color:var(--muted);font-size:12px;font-weight:500;
  cursor:pointer;font-family:'Inter',sans-serif;flex-shrink:0;transition:all .15s;}
.signout-btn:active{border-color:var(--red);color:var(--red);}

/* SHARED */
.content{padding:16px 16px 0;}
.section-label{font-size:11px;font-weight:600;letter-spacing:.8px;
  text-transform:uppercase;color:var(--dim);margin:20px 0 10px;}
.btn{display:inline-flex;align-items:center;justify-content:center;gap:6px;
  padding:12px 20px;border-radius:10px;font-size:14px;font-weight:500;
  cursor:pointer;border:none;font-family:'Inter',sans-serif;
  transition:all .15s;-webkit-appearance:none;}
.btn-primary{background:var(--gold);color:#fff;}
body.light .btn-primary{color:#2c1a00;}
.btn-primary:active{transform:scale(.97);}
.btn-block{width:100%;}
.btn-ghost{background:transparent;color:var(--muted);border:1px solid var(--border);}
.btn-ghost:active{border-color:var(--gold);color:var(--gold);}
.btn-danger{background:transparent;color:var(--red);border:1px solid rgba(248,113,113,.3);}

.stats-row{display:grid;grid-template-columns:repeat(3,1fr);gap:10px;margin-bottom:4px;}
.stat-card{background:var(--surface);border:1px solid var(--border);border-radius:12px;padding:14px 12px;transition:background .25s,border-color .25s;}
.stat-label{font-size:11px;color:var(--muted);margin-bottom:6px;}
.stat-value{font-family:'Space Grotesk',sans-serif;font-size:26px;font-weight:700;color:var(--gold);}
.stat-sub{font-size:11px;color:var(--dim);margin-top:2px;}

.today-card{background:var(--surface);border:1px solid var(--border);border-radius:12px;overflow:hidden;margin-bottom:8px;transition:background .25s,border-color .25s;}
.tc-header{padding:14px 16px;display:flex;align-items:center;gap:12px;cursor:pointer;user-select:none;}
.tc-badge{width:32px;height:32px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:12px;font-weight:700;flex-shrink:0;}
.tc-info{flex:1;min-width:0;}
.tc-title{font-size:14px;font-weight:500;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;}
.tc-meta{font-size:12px;color:var(--muted);margin-top:2px;}
.tc-arrow{color:var(--dim);font-size:14px;transition:transform .2s;flex-shrink:0;}
.today-card.open .tc-arrow{transform:rotate(180deg);}
.tc-body{display:none;border-top:1px solid var(--border);padding:14px 16px;}
.today-card.open .tc-body{display:block;}
.tc-notes{line-height:var(--line-h);white-space:pre-wrap;word-break:break-word;}
.tc-notes-empty{color:var(--muted);}
.mark-done-btn{margin-top:14px;width:100%;padding:11px;background:var(--green);color:#fff;border:none;border-radius:8px;font-size:14px;font-weight:600;cursor:pointer;font-family:'Inter',sans-serif;}
body.light .mark-done-btn{color:#052e16;}
.mark-done-btn:active{opacity:.85;}

.upcoming-item{background:var(--surface);border:1px solid var(--border);border-radius:10px;padding:12px 16px;margin-bottom:8px;display:flex;align-items:center;gap:12px;transition:background .25s,border-color .25s;}
.upcoming-chip{font-size:11px;font-weight:600;padding:3px 10px;border-radius:20px;background:rgba(96,165,250,.15);color:var(--blue);white-space:nowrap;flex-shrink:0;}
body.light .upcoming-chip{background:rgba(26,95,168,.1);}

.empty-box{text-align:center;padding:48px 20px;color:var(--muted);}
.empty-icon{font-size:36px;margin-bottom:10px;}
.empty-title{font-family:'Space Grotesk',sans-serif;color:var(--text);font-size:16px;margin-bottom:6px;}
.empty-desc{font-size:13px;}

.form-group{margin-bottom:16px;}
.form-label{display:block;font-size:12px;font-weight:500;color:var(--muted);margin-bottom:7px;letter-spacing:.2px;}
.form-input,.form-textarea{width:100%;background:var(--surface);border:1px solid var(--border);color:var(--text);padding:12px 14px;border-radius:10px;font-size:16px;font-family:'Inter',sans-serif;outline:none;transition:border-color .15s,background .25s,color .25s;-webkit-appearance:none;}
.form-input:focus,.form-textarea:focus{border-color:var(--gold);box-shadow:0 0 0 3px var(--gold-glow);}
.form-textarea{resize:none;min-height:220px;line-height:var(--line-h);}
.form-textarea::placeholder{color:var(--dim);}

.preview-box{background:var(--surface);border:1px solid var(--border);border-radius:12px;padding:16px;margin-bottom:16px;transition:background .25s,border-color .25s;}
.preview-head{font-size:12px;color:var(--muted);margin-bottom:14px;}
.preview-scroll{overflow-x:auto;padding-bottom:4px;}
.preview-tl{display:flex;align-items:flex-start;min-width:max-content;}
.pv-node{display:flex;flex-direction:column;align-items:center;width:52px;}
.pv-dot{width:34px;height:34px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:700;margin-bottom:6px;border:2px solid transparent;}
.pv-lbl{font-size:10px;color:var(--muted);text-align:center;line-height:1.3;}
.pv-date{font-size:10px;font-weight:500;text-align:center;margin-top:2px;}
.pv-line{width:20px;height:2px;background:var(--border);margin-top:16px;flex-shrink:0;}

.session-card{background:var(--surface);border:1px solid var(--border);border-radius:12px;overflow:hidden;margin-bottom:10px;cursor:pointer;transition:border-color .15s,background .25s;}
.session-card:active{border-color:var(--gold-dim);}
.sc-top{padding:14px 16px 10px;}
.sc-title{font-family:'Space Grotesk',sans-serif;font-size:15px;font-weight:600;margin-bottom:4px;line-height:1.3;}
.sc-date{font-size:12px;color:var(--muted);}
.sc-nodes{padding:10px 16px;border-top:1px solid var(--border);display:flex;gap:6px;align-items:center;flex-wrap:wrap;}
.mn{width:24px;height:24px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:10px;font-weight:700;}
.mn-done{opacity:.3;}
.mn-today{box-shadow:0 0 8px currentColor;}
.sc-prog{padding:10px 16px;border-top:1px solid var(--border);display:flex;align-items:center;gap:10px;}
.prog-wrap{flex:1;height:4px;background:var(--border);border-radius:2px;overflow:hidden;}
.prog-fill{height:100%;border-radius:2px;background:linear-gradient(90deg,var(--gold),var(--green));}
.prog-txt{font-size:11px;color:var(--muted);white-space:nowrap;}

.pill-row{display:flex;gap:8px;margin-bottom:14px;overflow-x:auto;padding-bottom:2px;}
.pill{padding:6px 14px;border-radius:20px;font-size:12px;cursor:pointer;border:1px solid var(--border);background:transparent;color:var(--muted);font-family:'Inter',sans-serif;white-space:nowrap;-webkit-appearance:none;}
.pill.active{background:var(--gold-glow);color:var(--gold);border-color:var(--gold-dim);}

/* SEARCH BAR */
.search-wrap{
  position:relative;margin-bottom:12px;
}
.search-input{
  width:100%;background:var(--surface);border:1px solid var(--border);
  color:var(--text);padding:11px 14px 11px 40px;
  border-radius:10px;font-size:16px;font-family:'Inter',sans-serif;
  outline:none;transition:border-color .15s,background .25s;
  -webkit-appearance:none;
}
.search-input:focus{border-color:var(--gold);box-shadow:0 0 0 3px var(--gold-glow);}
.search-input::placeholder{color:var(--dim);}
.search-icon{
  position:absolute;left:13px;top:50%;transform:translateY(-50%);
  color:var(--dim);pointer-events:none;
}
.search-clear{
  position:absolute;right:12px;top:50%;transform:translateY(-50%);
  background:none;border:none;color:var(--muted);cursor:pointer;
  font-size:18px;line-height:1;padding:2px;display:none;
}
.search-clear.show{display:block;}

/* PAGINATION */
.pagination{
  display:flex;align-items:center;justify-content:center;
  gap:6px;padding:16px 0 4px;flex-wrap:wrap;
}
.pg-btn{
  min-width:36px;height:36px;border-radius:8px;
  border:1px solid var(--border);background:transparent;
  color:var(--muted);font-size:13px;font-family:'Inter',sans-serif;
  cursor:pointer;display:flex;align-items:center;justify-content:center;
  transition:all .15s;padding:0 10px;
}
.pg-btn:active{border-color:var(--gold);color:var(--gold);}
.pg-btn.active{background:var(--gold-glow);border-color:var(--gold);color:var(--gold);font-weight:600;}
.pg-btn:disabled{opacity:.3;cursor:default;}
.pg-info{font-size:12px;color:var(--muted);padding:0 4px;}

/* DATE EDIT INPUT */
.date-edit-input{
  background:var(--bg);border:1px solid var(--border);
  color:var(--text);padding:8px 12px;border-radius:8px;
  font-size:15px;font-family:'Inter',sans-serif;outline:none;
  transition:border-color .15s;-webkit-appearance:none;
  width:100%;margin-bottom:10px;
}
.date-edit-input:focus{border-color:var(--gold);}

.tag-chip{
  display:inline-flex;align-items:center;gap:4px;
  padding:3px 10px;border-radius:20px;font-size:11px;font-weight:600;
  background:var(--surface2);color:var(--muted);border:1px solid var(--border);
  white-space:nowrap;cursor:default;
}
.tag-chip.colored{background:var(--tag-bg,var(--surface2));color:var(--tag-fg,var(--muted));border-color:var(--tag-border,var(--border));}
.sc-tags{padding:8px 16px 10px;display:flex;gap:6px;flex-wrap:wrap;}
.tag-input-wrap{
  display:flex;flex-wrap:wrap;gap:6px;align-items:center;
  background:var(--surface);border:1px solid var(--border);
  border-radius:10px;padding:8px 12px;cursor:text;
  transition:border-color .15s;min-height:46px;
}
.tag-input-wrap.focus{border-color:var(--gold);box-shadow:0 0 0 3px var(--gold-glow);}
.tag-pill-rm{
  display:inline-flex;align-items:center;gap:4px;
  padding:3px 8px 3px 10px;border-radius:20px;
  font-size:12px;font-weight:500;cursor:default;
  background:var(--surface2);color:var(--text);border:1px solid var(--border);
}
.tag-pill-rm .rm{cursor:pointer;color:var(--muted);font-size:14px;line-height:1;padding:0 1px;}
.tag-pill-rm .rm:hover{color:var(--red);}
.tag-bare-input{
  border:none;background:transparent;outline:none;
  color:var(--text);font-size:14px;font-family:'Inter',sans-serif;
  min-width:80px;flex:1;padding:2px 0;
}
.tag-bare-input::placeholder{color:var(--dim);}
.tag-suggestions{

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
import { getAuth, GoogleAuthProvider, signInWithPopup, onAuthStateChanged, signOut as fbSignOut }
  from "https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js";
import { getFirestore, collection, doc, getDocs, setDoc, deleteDoc, onSnapshot, writeBatch }
  from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";

// ── Firebase config ──
const firebaseConfig = {
  apiKey: "AIzaSyBdKEU72S_F3Rz6PSwfqiTsxEY4fu38PMo",
  authDomain: "review-0603.firebaseapp.com",
  projectId: "review-0603",
  storageBucket: "review-0603.firebasestorage.app",
  messagingSenderId: "571459723858",
  appId: "1:571459723858:web:26358cd3d56d5f7c66358b"
};
const fbApp  = initializeApp(firebaseConfig);
const auth   = getAuth(fbApp);
const db     = getFirestore(fbApp);
const provider = new GoogleAuthProvider();

let currentUser = null;
let unsubscribe  = null; // Firestore listener

// ── Auth functions ──
window.signInWithGoogle = async () => {
  try { await signInWithPopup(auth, provider); }
  catch(e){ console.error(e); alert('登入失敗，請再試一次。'); }
};
window.signOut = async () => {
  if(!confirm('確定要登出嗎？')) return;
  if(unsubscribe) unsubscribe();
  await fbSignOut(auth);
};

// ── Auth state ──
onAuthStateChanged(auth, user => {
  currentUser = user;
  if(user){
    // hide auth screen
    document.getElementById('auth-screen').style.display = 'none';
    // show user chip
    const chip = document.getElementById('user-chip');
    chip.style.display = 'flex';
    document.getElementById('user-avatar').src = user.photoURL || '';
    document.getElementById('user-name').textContent = user.displayName?.split(' ')[0] || '用戶';
    document.getElementById('drawer-avatar').src = user.photoURL || '';
    document.getElementById('drawer-name').textContent = user.displayName || '';
    document.getElementById('drawer-email').textContent = user.email || '';
    // start listening
    startListener(user.uid);
  } else {
    document.getElementById('auth-screen').style.display = 'flex';
    document.getElementById('user-chip').style.display = 'none';
    if(unsubscribe){ unsubscribe(); unsubscribe=null; }
    sessions = [];
    renderHome();
  }
});

// ── Firestore listener (real-time sync) ──
function startListener(uid){
  if(unsubscribe) unsubscribe();
  setSyncStatus('syncing');
  const colRef = collection(db, 'users', uid, 'sessions');
  unsubscribe = onSnapshot(colRef, snap => {
    sessions = snap.docs.map(d => d.data());
    sessions.sort((a,b) => b.id - a.id);
    renderHome();
    renderSessions();
    setSyncStatus('synced');
  }, err => {
    console.error(err);
    setSyncStatus('error');
  });
}

// ── Save / Delete to Firestore ──
window._fbSave = async (session) => {
  if(!currentUser) return;
  setSyncStatus('syncing');
  try {
    const ref = doc(db, 'users', currentUser.uid, 'sessions', String(session.id));
    await setDoc(ref, session);
    setSyncStatus('synced');
  } catch(e){ console.error(e); setSyncStatus('error'); }
};
window._fbDelete = async (sid) => {
  if(!currentUser) return;
  setSyncStatus('syncing');
  try {
    await deleteDoc(doc(db, 'users', currentUser.uid, 'sessions', String(sid)));
    setSyncStatus('synced');
  } catch(e){ console.error(e); setSyncStatus('error'); }
};

function setSyncStatus(s){
  const dot = document.getElementById('sync-dot');
  dot.className = 'sync-dot ' + s;
  dot.title = s==='synced'?'已同步':s==='syncing'?'同步中…':'同步失敗';
}
</script>

// Assign consistent colour index per tag name
const tagColorMap = {}; // tag -> palette index
let tagColorCounter = 0;
function getTagPalette(tag){
  if(tagColorMap[tag]===undefined){
    tagColorMap[tag] = tagColorCounter % TAG_PALETTES.length;
    tagColorCounter++;
  }
  const isLight = document.body.classList.contains('light');
  return isLight ? TAG_PALETTES_LIGHT[tagColorMap[tag]] : TAG_PALETTES[tagColorMap[tag]];
}

function tagChipHtml(tag, removable=false, sid=null){
  const [bg,fg,border] = getTagPalette(tag);
  if(removable){
    return `<span class="tag-pill-rm" style="background:${bg};color:${fg};border-color:${border};">${esc(tag)}<span class="rm" onclick="removeInputTag('${esc(tag)}')">×</span></span>`;
  }
  return `<span class="tag-chip colored" style="--tag-bg:${bg};--tag-fg:${fg};--tag-border:${border};">${esc(tag)}</span>`;
}

function allTags(){
  const set=new Set();
  sessions.forEach(s=>(s.tags||[]).forEach(t=>set.add(t)));
  return [...set].sort();
}

function fmtDate(s){

  return `${d.getFullYear()}年${d.getMonth()+1}月${d.getDate()}日（週${W[d.getDay()]}）`;
}
function shortDate(s){const d=new Date(s+'T00:00:00');return `${d.getMonth()+1}/${d.getDate()}`;}
function diff(a,b){return Math.round((new Date(b+'T00:00:00')-new Date(a+'T00:00:00'))/86400000);}
function esc(s){return(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');}
function rdates(date){return INTERVALS.map(n=>addDays(date,n));}
function progress(s){const done=(s.reviewDone||[]).length;return{done,total:INTERVALS.length,pct:Math.round(done/INTERVALS.length*100)};}
function isComplete(s){return(s.reviewDone||[]).length===INTERVALS.length;}

const DARK_BG=[
  {id:'bg-dark',  label:'深夜',colors:['#0a0e1a','#1e2d45']},
  {id:'bg-forest',label:'深林',colors:['#0c1410','#243322']},
  {id:'bg-plum',  label:'深紫',colors:['#120d1a','#332447']},
  {id:'bg-slate', label:'石板',colors:['#0e1117','#2d3748']},
  {id:'bg-sepia', label:'深棕',colors:['#1a1410','#3a3020']},
];
const LIGHT_BG=[
  {id:'bg-paper', label:'米紙',colors:['#f5f0e8','#d9d0c0']},
  {id:'bg-mint',  label:'薄荷',colors:['#eef5f0','#c8ddd0']},
  {id:'bg-sky',   label:'晴空',colors:['#edf2f9','#c5d4ea']},
  {id:'bg-cream', label:'奶油',colors:['#fdf8ee','#e0d5be']},
  {id:'bg-stone', label:'暖石',colors:['#f0ede8','#d0c8bc']},
];
const FONT_SIZES=[13,14,15,16,17,18,20];
let theme={mode:'dark',bg:'bg-dark',fontSize:15};

function loadTheme(){const s=localStorage.getItem('eb_theme');if(s)theme=JSON.parse(s);}
function saveTheme(){localStorage.setItem('eb_theme',JSON.stringify(theme));}
function applyTheme(){
  const b=document.body;
  b.classList.remove('dark','light');
  b.classList.add(theme.mode);
  [...DARK_BG,...LIGHT_BG].forEach(x=>b.classList.remove(x.id));
  b.classList.add(theme.bg);
  b.style.setProperty('--font-size',theme.fontSize+'px');
  const mt=document.getElementById('meta-theme');
  if(mt) mt.content=theme.mode==='dark'?'#0a0e1a':'#f5f0e8';
  // also apply to auth screen bg
  const as=document.getElementById('auth-screen');
  if(as) as.style.background='var(--bg)';
  syncDrawerUI();
}
function setMode(m){
  theme.mode=m;
  if(m==='dark'&&!DARK_BG.find(x=>x.id===theme.bg))  theme.bg='bg-dark';
  if(m==='light'&&!LIGHT_BG.find(x=>x.id===theme.bg)) theme.bg='bg-paper';
  saveTheme();applyTheme();
}
function setBg(id){theme.bg=id;saveTheme();applyTheme();}
function adjustFont(dir){
  const idx=FONT_SIZES.indexOf(theme.fontSize);
  theme.fontSize=FONT_SIZES[Math.max(0,Math.min(FONT_SIZES.length-1,idx+dir))];
  saveTheme();applyTheme();
}
function trackClick(e){
  const r=document.getElementById('font-track').getBoundingClientRect();
  const idx=Math.round((e.clientX-r.left)/r.width*(FONT_SIZES.length-1));
  theme.fontSize=FONT_SIZES[Math.max(0,Math.min(FONT_SIZES.length-1,idx))];
  saveTheme();applyTheme();
}
function syncDrawerUI(){
  document.getElementById('btn-dark').classList.toggle('active',theme.mode==='dark');
  document.getElementById('btn-light').classList.toggle('active',theme.mode==='light');
  const list=theme.mode==='dark'?DARK_BG:LIGHT_BG;
  document.getElementById('swatch-grid').innerHTML=list.map(item=>`
    <div class="swatch-item">
      <div class="swatch${theme.bg===item.id?' active':''}"
           style="background:linear-gradient(135deg,${item.colors[0]} 50%,${item.colors[1]} 50%)"
           onclick="setBg('${item.id}')"></div>
      <div class="swatch-label">${item.label}</div>
    </div>`).join('');
  const idx=FONT_SIZES.indexOf(theme.fontSize);
  const pct=idx/(FONT_SIZES.length-1)*100;
  document.getElementById('font-fill').style.width=pct+'%';
  document.getElementById('font-thumb').style.left=pct+'%';
  document.getElementById('font-label').textContent=theme.fontSize+'px';
}

function renderInputTags(){
  document.getElementById('tag-pills').innerHTML = inputTags.map(t=>tagChipHtml(t,true)).join('');
}
function addInputTag(val){
  const v=val.trim().slice(0,20);
  if(v && !inputTags.includes(v)){ inputTags.push(v); renderInputTags(); }
  document.getElementById('tag-bare').value='';
  renderTagSuggestions('');
}
function removeInputTag(tag){
  inputTags=inputTags.filter(t=>t!==tag);
  renderInputTags();
}
function onTagKey(e){
  const inp=document.getElementById('tag-bare');
  if((e.key==='Enter'||e.key===','||e.key==='，')&&inp.value.trim()){
    e.preventDefault();addInputTag(inp.value);
  } else if(e.key==='Backspace'&&!inp.value&&inputTags.length){
    inputTags.pop();renderInputTags();
  }
}
function onTagInput(){
  const v=document.getElementById('tag-bare').value;
  renderTagSuggestions(v);
}
function renderTagSuggestions(q){
  const box=document.getElementById('tag-suggestions');
  const existing=allTags().filter(t=>!inputTags.includes(t)&&(!q||t.toLowerCase().includes(q.toLowerCase())));
  if(!existing.length){box.classList.remove('show');return;}
  box.innerHTML=existing.map(t=>`<div class="tag-sugg-item" onmousedown="addInputTag('${esc(t)}')">${tagChipHtml(t)} ${esc(t)}</div>`).join('');
  box.classList.add('show');
}
function showSuggestions(){
  document.getElementById('tag-input-wrap')?.classList.add('focus');
  document.getElementById('tag-wrap')?.classList.add('focus');
  renderTagSuggestions(document.getElementById('tag-bare').value);
}
function hideSuggestions(){
  document.getElementById('tag-wrap')?.classList.remove('focus');
  setTimeout(()=>document.getElementById('tag-suggestions')?.classList.remove('show'),150);
}

function renderHome(){
  const t=today();let due=[],upcoming=[];
  sessions.forEach(s=>{
    rdates(s.date).forEach((rd,i)=>{
      const done=(s.reviewDone||[]).includes(i),d=diff(t,rd);
      if(d===0&&!done) due.push({s,i,rd});
      else if(d>0&&d<=3&&!done) upcoming.push({s,i,rd,d});
    });
  });
  document.getElementById('st-total').textContent=sessions.length;
  document.getElementById('st-due').textContent=due.length;
  const badge=document.getElementById('badge-home');
  if(due.length){badge.textContent=due.length;badge.style.display='flex';}else badge.style.display='none';
  let total=sessions.length*INTERVALS.length,done=sessions.reduce((a,s)=>a+(s.reviewDone||[]).length,0);
  document.getElementById('st-rate').textContent=total?Math.round(done/total*100)+'%':'—';

  const tEl=document.getElementById('today-list');
  tEl.innerHTML=!due.length
    ?`<div class="empty-box" style="padding:28px 16px;"><div class="empty-icon">🎉</div><div class="empty-title">今日無需複習</div><div class="empty-desc">繼續保持！</div></div>`
    :due.map(({s,i})=>`
      <div class="today-card" id="tc-${s.id}-${i}">
        <div class="tc-header" onclick="toggleTC(${s.id},${i})">
          <div class="tc-badge ${SC[i]}">${i+1}</div>
          <div class="tc-info">
            <div class="tc-title">${esc(s.title)}</div>
            <div class="tc-meta">${R_LABELS[i]}複習 · 學習於 ${shortDate(s.date)}</div>
          </div>
          <span class="tc-arrow">▾</span>
        </div>
        <div class="tc-body">
          ${s.notes?`<div class="tc-notes">${esc(s.notes)}</div>`:`<div class="tc-notes-empty">（未填寫筆記）</div>`}
          <button class="mark-done-btn" onclick="markDone(${s.id},${i})">✓ 標記已複習</button>
        </div>
      </div>`).join('');

  upcoming.sort((a,b)=>a.d-b.d);
  document.getElementById('upcoming-list').innerHTML=!upcoming.length
    ?`<div style="padding:14px 0;font-size:13px;color:var(--muted);">近3天無即將到來的複習</div>`
    :upcoming.map(({s,i,rd,d})=>`
      <div class="upcoming-item">
        <div class="tc-badge ${SC[i]}" style="opacity:.7;flex-shrink:0;">${i+1}</div>
        <div style="flex:1;min-width:0;">
          <div style="font-size:14px;font-weight:500;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;">${esc(s.title)}</div>
          <div style="font-size:12px;color:var(--muted);margin-top:2px;">${R_LABELS[i]}複習</div>
        </div>
        <div class="upcoming-chip">${d===1?'明天':d+'天後'} · ${shortDate(rd)}</div>
      </div>`).join('');
}
function toggleTC(sid,i){const el=document.getElementById(`tc-${sid}-${i}`);if(el)el.classList.toggle('open');}
function markDone(sid,i){
  const s=sessions.find(x=>x.id===sid);if(!s)return;
  if(!s.reviewDone)s.reviewDone=[];
  if(!s.reviewDone.includes(i))s.reviewDone.push(i);
  save(s);
}

// ═══════════════════════════════
//  SESSIONS
// ═══════════════════════════════
function renderSessions(){
  renderTagFilterRow();
  let list=[...sessions].sort((a,b)=>a.date<b.date?1:a.date>b.date?-1:b.id-a.id);
  if(currentFilter==='active') list=list.filter(s=>!isComplete(s));
  if(currentFilter==='complete') list=list.filter(s=>isComplete(s));
  if(currentTagFilter) list=list.filter(s=>(s.tags||[]).includes(currentTagFilter));
  if(currentSearch){
    const q=currentSearch.toLowerCase();
    list=list.filter(s=>
      (s.title||'').toLowerCase().includes(q)||
      (s.notes||'').toLowerCase().includes(q)||
      (s.tags||[]).some(t=>t.toLowerCase().includes(q))
    );
  }
  const total=list.length;
  const totalPages=Math.max(1,Math.ceil(total/PAGE_SIZE));
  if(currentPage>totalPages) currentPage=totalPages;
  const paged=list.slice((currentPage-1)*PAGE_SIZE, currentPage*PAGE_SIZE);
  const t=today(),el=document.getElementById('sessions-list');
  if(!paged.length){
    el.innerHTML=`<div class="empty-box"><div class="empty-icon">${currentSearch?'🔍':'🧠'}</div><div class="empty-title">${currentSearch?'找不到結果':'尚無學習記錄'}</div><div class="empty-desc">${currentSearch?'試試其他關鍵字':'點下方「＋新增」開始使用'}</div></div>`;
    document.getElementById('pagination').innerHTML='';
    return;
  }
  el.innerHTML=paged.map(s=>{
    const prog=progress(s);
    const nodes=rdates(s.date).map((rd,i)=>{
      const done=(s.reviewDone||[]).includes(i),d=diff(t,rd);
      return `<div class="mn ${SC[i]}${done?' mn-done':''}${d===0&&!done?' mn-today':''}">${done?'✓':i+1}</div>`;
    }).join('');
    const tagsHtml=(s.tags||[]).length
      ?`<div class="sc-tags">${s.tags.map(tg=>tagChipHtml(tg)).join('')}</div>`:'';
    return `<div class="session-card" onclick="showPage('detail',${s.id})">
      <div class="sc-top">
        <div class="sc-title">${esc(s.title)}</div>
        <div class="sc-date">學習日：${fmtDate(s.date)}</div>
      </div>
      ${tagsHtml}
      <div class="sc-nodes">${nodes}</div>
      <div class="sc-prog"><div class="prog-wrap"><div class="prog-fill" style="width:${prog.pct}%"></div></div><div class="prog-txt">${prog.done}/${prog.total} 完成</div></div>
    </div>`;
  }).join('');
  // pagination
  renderPagination(totalPages, total);
}
function renderPagination(totalPages, total){
  const pg=document.getElementById('pagination');
  if(totalPages<=1){pg.innerHTML='';return;}
  let html='';
  html+=`<button class="pg-btn" onclick="goPage(${currentPage-1})" ${currentPage===1?'disabled':''}>‹</button>`;
  // show up to 5 page buttons with ellipsis
  let pages=[];
  if(totalPages<=7){for(let i=1;i<=totalPages;i++)pages.push(i);}
  else{
    pages=[1];
    if(currentPage>3) pages.push('…');
    for(let i=Math.max(2,currentPage-1);i<=Math.min(totalPages-1,currentPage+1);i++) pages.push(i);
    if(currentPage<totalPages-2) pages.push('…');
    pages.push(totalPages);
  }
  pages.forEach(p=>{
    if(p==='…') html+=`<span class="pg-info">…</span>`;
    else html+=`<button class="pg-btn${p===currentPage?' active':''}" onclick="goPage(${p})">${p}</button>`;
  });
  html+=`<button class="pg-btn" onclick="goPage(${currentPage+1})" ${currentPage===totalPages?'disabled':''}>›</button>`;
  html+=`<span class="pg-info">共${total}筆</span>`;
  pg.innerHTML=html;
}
function goPage(p){
  currentPage=p;
  renderSessions();
  // scroll to top of sessions page
  document.getElementById('page-sessions').scrollTo({top:0,behavior:'smooth'});
}
function filterSessions(type,btn){
  currentFilter=type;
  currentPage=1;
  document.querySelectorAll('.pill').forEach(b=>b.classList.remove('active'));
  btn.classList.add('active');
  renderSessions();
}
function onSearch(){
  const val=document.getElementById('search-input').value;
  currentSearch=val;
  currentPage=1;
  const clr=document.getElementById('search-clear');
  if(clr) clr.classList.toggle('show',val.length>0);
  renderSessions();
}
function clearSearch(){
  document.getElementById('search-input').value='';
  currentSearch='';
  currentPage=1;
  const clr=document.getElementById('search-clear');
  if(clr) clr.classList.remove('show');
  renderSessions();
}

function updatePreview(){
  const dv=document.getElementById('inp-date').value,tl=document.getElementById('preview-tl');
  if(!dv){tl.innerHTML=`<span style="font-size:12px;color:var(--muted)">請先選擇學習日期</span>`;return;}
  let h=`<div class="pv-node"><div class="pv-dot s0" style="border-color:var(--gold)">📖</div><div class="pv-lbl">學習日</div><div class="pv-date" style="color:var(--gold)">${shortDate(dv)}</div></div>`;
  rdates(dv).forEach((rd,i)=>{
    h+=`<div class="pv-line"></div><div class="pv-node"><div class="pv-dot ${SC[i]}">${i+1}</div><div class="pv-lbl">${R_LABELS[i]}</div><div class="pv-date">${shortDate(rd)}</div></div>`;
  });
  tl.innerHTML=h;
}
function addSession(){
  const dv=document.getElementById('inp-date').value;
  const notes=document.getElementById('inp-notes').value.trim();
  // flush any pending tag text
  const bareVal=document.getElementById('tag-bare').value.trim();
  if(bareVal) addInputTag(bareVal);
  if(!dv){alert('請選擇學習日期');return;}
  if(!notes){alert('請填寫學習內容');return;}
  const title=(notes.split('\n').find(l=>l.trim())||'（無標題）').trim().slice(0,60);
  const s={id:Date.now(),date:dv,title,notes,tags:[...inputTags],reviewDone:[],reviewNotes:{}};
  save(s);
  clearForm();showPage('sessions');
}
function clearForm(){
  document.getElementById('inp-date').value=today();
  document.getElementById('inp-notes').value='';
  inputTags=[];
  renderInputTags();
  document.getElementById('tag-bare').value='';
  updatePreview();
}

function renderDetail(sid){
  const s=sessions.find(x=>x.id===sid);if(!s)return;
  const t=today(),prog=progress(s);
  const titleLine=s.title||(s.notes||'').split('\n').find(l=>l.trim())||'（無標題）';
  document.getElementById('tb-title').textContent=titleLine;
  document.getElementById('tb-sub').textContent=fmtDate(s.date);
  const tlRows=rdates(s.date).map((rd,i)=>{
    const done=(s.reviewDone||[]).includes(i),d=diff(t,rd);
    let status='';
    if(done) status=`<span style="color:var(--green)">✓ 已完成</span>`;
    else if(d<0) status=`<span style="color:var(--red)">已過期 ${-d} 天</span>`;
    else if(d===0) status=`<span style="color:var(--gold)">⚡ 今天</span>`;
    else status=`<span style="color:var(--muted)">${d} 天後</span>`;
    const rn=(s.reviewNotes||{})[i];
    return `<div class="tl-row${done?' done':''}">
      <div class="tl-dot ${SC[i]}">${i+1}</div>
      <div class="tl-info">
        <div class="tl-name">${R_LABELS[i]}　複習</div>
        <div class="tl-date">${fmtDate(rd)}</div>
        <div class="tl-status">${status}</div>
        ${rn?`<div class="tl-rnote">📝 ${esc(rn)}</div>`:''}
      </div>
      <button class="check-btn${done?' on':''}" onclick="toggleRev(${s.id},${i})">${done?'✓':'○'}</button>
    </div>`;
  }).join('');
  const tagsHtml=(s.tags||[]).length
    ?`<div style="display:flex;gap:6px;flex-wrap:wrap;margin-bottom:14px;">${(s.tags).map(t=>tagChipHtml(t)).join('')}</div>`:'';
  document.getElementById('detail-content').innerHTML=`
    <div class="detail-head">
      <div class="detail-date">學習日：${fmtDate(s.date)}</div>
      ${tagsHtml}
      <div class="prog-row"><div class="prog-wrap" style="flex:1"><div class="prog-fill" style="width:${prog.pct}%"></div></div><span style="font-size:12px;color:var(--muted)">複習 ${prog.done}/${prog.total}</span></div>
      <div class="notes-view" id="notes-view">${s.notes?esc(s.notes):'<span style="color:var(--dim)">（未填寫筆記）</span>'}</div>
      <div style="display:flex;gap:8px;margin-top:12px;">
        <button class="btn btn-ghost" style="flex:1;font-size:13px;" onclick="editNotes(${s.id})">✏️ 編輯</button>
        <button class="btn btn-danger" style="font-size:13px;" onclick="deleteSession(${s.id})">刪除</button>
      </div>
    </div>
    <div style="margin-bottom:8px;" class="section-label">複習節點</div>
    <div class="tl-card">${tlRows}</div>`;
}
function toggleRev(sid,i){
  const s=sessions.find(x=>x.id===sid);if(!s)return;
  if(!s.reviewDone)s.reviewDone=[];
  const idx=s.reviewDone.indexOf(i);
  if(idx===-1)s.reviewDone.push(i);else s.reviewDone.splice(idx,1);
  save(s);
  // re-render detail immediately for snappy UX
  renderDetail(sid);
}
function editNotes(sid){
  const s=sessions.find(x=>x.id===sid);if(!s)return;
  // seed inputTags with existing tags for editing
  inputTags=[...(s.tags||[])];
  const v=document.getElementById('notes-view');
  v.innerHTML=`
    <div style="margin-bottom:6px;">
      <div style="font-size:11px;color:var(--muted);margin-bottom:4px;letter-spacing:.2px;">學習日期</div>
      <input type="date" class="date-edit-input" id="edit-date" value="${s.date}" style="margin-bottom:0;">
    </div>
    <div style="margin-bottom:8px;">
      <div style="font-size:11px;color:var(--muted);margin-bottom:4px;letter-spacing:.2px;">標籤</div>
      <div class="tag-input-wrap" id="tag-wrap-edit" onclick="document.getElementById('tag-bare-edit').focus()">
        <div id="tag-pills-edit"></div>
        <input class="tag-bare-input" id="tag-bare-edit" placeholder="輸入後按 Enter…" autocomplete="off"
          oninput="onTagInputEdit()" onkeydown="onTagKeyEdit(event)" onfocus="showSuggestionsEdit()" onblur="hideSuggestionsEdit()">
      </div>
      <div class="tag-suggestions" id="tag-suggestions-edit"></div>
    </div>
    <textarea class="edit-notes-ta" id="edit-ta">${esc(s.notes||'')}</textarea>
    <button class="save-notes-btn" onclick="saveNotes(${sid})">儲存</button>`;
  renderInputTagsEdit();
  document.getElementById('edit-ta').focus();
}
function renderInputTagsEdit(){
  const el=document.getElementById('tag-pills-edit');
  if(el) el.innerHTML=inputTags.map(t=>
    `<span class="tag-pill-rm" style="background:${getTagPalette(t)[0]};color:${getTagPalette(t)[1]};border-color:${getTagPalette(t)[2]};">${esc(t)}<span class="rm" onclick="removeInputTagEdit('${esc(t)}')">×</span></span>`
  ).join('');
}
function removeInputTagEdit(tag){ inputTags=inputTags.filter(t=>t!==tag); renderInputTagsEdit(); }
function onTagKeyEdit(e){
  const inp=document.getElementById('tag-bare-edit');
  if((e.key==='Enter'||e.key===','||e.key==='，')&&inp.value.trim()){
    e.preventDefault();
    const v=inp.value.trim().slice(0,20);
    if(v&&!inputTags.includes(v)) inputTags.push(v);
    renderInputTagsEdit();inp.value='';renderTagSuggestionsEdit('');
  } else if(e.key==='Backspace'&&!inp.value&&inputTags.length){
    inputTags.pop();renderInputTagsEdit();
  }
}
function onTagInputEdit(){ renderTagSuggestionsEdit(document.getElementById('tag-bare-edit').value); }
function renderTagSuggestionsEdit(q){
  const box=document.getElementById('tag-suggestions-edit');if(!box)return;
  const existing=allTags().filter(t=>!inputTags.includes(t)&&(!q||t.toLowerCase().includes(q.toLowerCase())));
  if(!existing.length){box.classList.remove('show');return;}
  box.innerHTML=existing.map(t=>`<div class="tag-sugg-item" onmousedown="addInputTagEdit('${esc(t)}')">${tagChipHtml(t)} ${esc(t)}</div>`).join('');
  box.classList.add('show');
}
function addInputTagEdit(val){
  const v=val.trim().slice(0,20);
  if(v&&!inputTags.includes(v)){inputTags.push(v);renderInputTagsEdit();}
  document.getElementById('tag-bare-edit').value='';
  renderTagSuggestionsEdit('');
}
function showSuggestionsEdit(){ document.getElementById('tag-wrap-edit')?.classList.add('focus'); renderTagSuggestionsEdit(document.getElementById('tag-bare-edit')?.value||''); }
function hideSuggestionsEdit(){ document.getElementById('tag-wrap-edit')?.classList.remove('focus'); setTimeout(()=>document.getElementById('tag-suggestions-edit')?.classList.remove('show'),150); }

function saveNotes(sid){
  const s=sessions.find(x=>x.id===sid);if(!s)return;
  const ta=document.getElementById('edit-ta');
  const dateEl=document.getElementById('edit-date');
  // flush any pending tag text
  const bareVal=document.getElementById('tag-bare-edit')?.value.trim();
  if(bareVal){ const v=bareVal.slice(0,20); if(v&&!inputTags.includes(v)) inputTags.push(v); }
  if(ta){
    s.notes=ta.value;
    s.title=(ta.value.split('\n').find(l=>l.trim())||'（無標題）').trim().slice(0,60);
    s.tags=[...inputTags];
    if(dateEl&&dateEl.value) s.date=dateEl.value;
    save(s);renderDetail(sid);
  }
}
function deleteSession(sid){
  if(!confirm('確定刪除此學習記錄？'))return;
  deleteRemote(sid);
  showPage('sessions');
}

// ═══════════════════════════════
//  INIT
// ═══════════════════════════════
loadTheme();
applyTheme();
initForm();
</script>
